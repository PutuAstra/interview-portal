<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Review — ZeusHire</title>
  <link rel="icon" type="image/png" href="cti-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20250528a" />
  <style>
    .share-container { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }
    .share-topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .share-topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; color: var(--text); }
    .share-body { flex: 1; max-width: 1100px; margin: 0 auto; padding: 24px 20px; width: 100%; box-sizing: border-box; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .video-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--card); display: flex; flex-direction: column; }
    .video-card video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; }
    .video-card-body { padding: 10px 12px; }
    .score-stars { display: flex; gap: 2px; justify-content: center; padding: 6px 10px 8px; border-top: 1px solid var(--border); }
    .score-stars span { font-size: 15px; }
    .badge-read-only { display: inline-flex; align-items: center; gap: 5px; background: rgba(99,100,167,0.12); color: #6264a7; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; border: 1px solid rgba(99,100,167,0.25); }
    .decision-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .decision-fwd { background: rgba(22,163,74,0.12); color: #16a34a; border: 1px solid rgba(22,163,74,0.25); }
    .decision-rej { background: rgba(220,38,38,0.10); color: #dc2626; border: 1px solid rgba(220,38,38,0.2); }
  </style>
</head>
<body>

<div class="share-container">

  <div class="share-topbar" id="share-topbar">
    <div class="share-topbar-brand">
      <img src="cti-logo.png" alt="CTI" style="height:30px;width:auto" />
      <span id="topbar-brand-name">CTI ZeusHire</span>
    </div>
    <span class="badge-read-only">👁 Read-Only Review</span>
  </div>

  <div class="share-body" id="share-body">
    <div class="spinner" style="margin:80px auto"></div>
  </div>

</div>

<script>
const WORKER_URL = 'https://interview-api.putuastrawijaya.workers.dev';
const shareToken = new URLSearchParams(location.search).get('s');

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showMsg(icon, title, body) {
  document.getElementById('share-body').innerHTML = `
    <div style="max-width:460px;margin:80px auto;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">${icon}</div>
      <h2>${title}</h2>
      <p class="text-muted mt-8">${body}</p>
    </div>`;
}

async function boot() {
  if (!shareToken) return showMsg('⚠️','Link Invalid','No share token found in this URL.');
  try {
    const res = await fetch(`${WORKER_URL}/api/share/${shareToken}`);
    if (!res.ok) return showMsg('⚠️','Link Not Found','This share link is invalid or has been revoked.');
    const data = await res.json();
    applyBranding(data.branding || {});
    renderPage(data);
  } catch {
    showMsg('⚠️','Connection Error','Could not connect to the server. Please try again later.');
  }
}

function applyBranding(b) {
  if (b.brandColor) {
    document.documentElement.style.setProperty('--accent', b.brandColor);
    document.getElementById('share-topbar').style.borderBottom = `1px solid ${b.brandColor}30`;
  }
  const name = b.brandName || 'CTI ZeusHire';
  document.getElementById('topbar-brand-name').textContent = name;
  document.title = name + ' — Candidate Review';
}

async function renderPage({ session, interview, review, shareToken: tok }) {
  const el = document.getElementById('share-body');

  // ── Fetch all video URLs in parallel ──
  const responses = session.responses || [];
  const videoItems = responses.length
    ? await Promise.all(responses.map(async r => {
        const q = interview?.questions?.[r.questionIndex];
        const data = await fetch(`${WORKER_URL}/api/share/${tok}/video/${r.questionIndex}`)
          .then(res => res.json()).catch(() => ({}));
        return { q, downloadUrl: data.downloadUrl, questionIndex: r.questionIndex };
      }))
    : [];

  const qScores = review?.questionScores || {};

  const videosHTML = videoItems.length
    ? `<div class="video-grid">
        ${videoItems.map(({ q, downloadUrl, questionIndex }) => `
          <div class="video-card">
            ${downloadUrl
              ? `<video src="${downloadUrl}" controls preload="metadata"></video>`
              : `<div style="aspect-ratio:16/9;background:#111;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">Unavailable</div>`
            }
            <div class="video-card-body">
              <div style="font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px">Q${questionIndex + 1}</div>
              <div style="font-size:12px;color:var(--text);line-height:1.4">${q ? esc(q.text) : 'Question ' + (questionIndex + 1)}</div>
            </div>
            <div class="score-stars">
              ${Array.from({length:5}, (_,i) =>
                `<span style="color:${i < (qScores[questionIndex]||0) ? '#f59e0b' : 'var(--border)'}">★</span>`
              ).join('')}
            </div>
          </div>`).join('')}
      </div>`
    : `<div class="empty-state">No recordings available.</div>`;

  const decisionHTML = review?.decision
    ? `<span class="decision-badge ${review.decision === 'move_forward' ? 'decision-fwd' : 'decision-rej'}">
        ${review.decision === 'move_forward' ? '✓ Move Forward' : '✗ Not Moving Forward'}
       </span>`
    : `<span style="font-size:12px;color:var(--muted)">No decision yet</span>`;

  const overallStarsHTML = review?.stars
    ? `<span style="font-size:18px;color:#f59e0b">${'★'.repeat(review.stars)}</span><span style="font-size:18px;color:var(--border)">${'★'.repeat(5 - review.stars)}</span>`
    : `<span style="font-size:12px;color:var(--muted)">Not rated</span>`;

  const completedDate = session.completedAt
    ? new Date(session.completedAt).toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' })
    : '—';

  el.innerHTML = `
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:24px">
      <div>
        <h1 style="margin:0;font-size:22px">${esc(session.candidateName)}</h1>
        ${session.candidateEmail ? `<p class="text-muted text-sm mt-4">${esc(session.candidateEmail)}</p>` : ''}
        <p class="text-muted text-sm" style="margin-top:6px">${esc(interview?.title || 'Interview')} &nbsp;·&nbsp; Submitted ${completedDate}</p>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        ${decisionHTML}
        <div style="display:flex;align-items:center;gap:4px">${overallStarsHTML}</div>
      </div>
    </div>

    <!-- Videos -->
    <div class="card" style="margin-bottom:20px">
      <h3 style="margin:0 0 14px;font-size:14px">Recorded Answers</h3>
      ${videosHTML}
      ${videoItems.length && Object.keys(qScores).length
        ? `<p class="text-muted text-sm" style="margin-top:10px">⭐ Stars shown below each video are the recruiter's per-question scores.</p>`
        : ''}
    </div>

    <!-- Review notes -->
    ${review?.notes ? `
    <div class="card">
      <h3 style="margin:0 0 10px;font-size:14px">Recruiter Notes</h3>
      <p style="font-size:13px;color:var(--text-2);line-height:1.6;white-space:pre-wrap">${esc(review.notes)}</p>
    </div>` : ''}

    <!-- Read-only notice -->
    <p class="text-muted" style="font-size:11px;margin-top:20px;text-align:center">
      This is a read-only review link. Only the recruiting team can update the evaluation.
    </p>
  `;
}

boot();
</script>
</body>
</html>
