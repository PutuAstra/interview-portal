  <script>
    // PWA version guard — forces a hard reload when a new version is deployed.
    // Runs before anything else so stale-cached pages never render.
    (function() {
      var BUILD = '20250529p';
      var stored = sessionStorage.getItem('zh_build');
      if (stored && stored !== BUILD) {
        sessionStorage.setItem('zh_build', BUILD);
        location.reload(true);
        return;
      }
      sessionStorage.setItem('zh_build', BUILD);
    })();
  </script>
